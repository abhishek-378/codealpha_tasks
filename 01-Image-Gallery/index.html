<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Image Gallery</h1>

    <div class="buttons">

        <button class="filter-btn active" data-filter="all">All</button>

        <button class="filter-btn" data-filter="nature">Nature</button>

        <button class="filter-btn" data-filter="cars">Cars</button>

        <button class="filter-btn" data-filter="animals">Animals</button>

    </div>

    <div class="gallery">

    <img src="images/image1.jpeg" class="nature" alt="Nature Image 1">
    <img src="images/image2.jpeg" class="nature" alt="Nature Image 2">
    <img src="images/image3.jpeg" class="nature" alt="Nature Image 3">

    <img src="images/image4.jpeg" class="cars" alt="Car Image 1">
    <img src="images/image5.jpeg" class="cars" alt="Car Image 2">

    <img src="images/image6.jpeg" class="animals" alt="Animal Image 1">
    <img src="images/image7.jpeg" class="animals" alt="Animal Image 2">

</div>

    <div class="lightbox">

        <span class="close">&times;</span>

        <button class="prev">&#10094;</button>

        <img class="lightbox-image">

        <button class="next">&#10095;</button>

    </div>

    <script src="script.js"></script>

</body>

</html>
